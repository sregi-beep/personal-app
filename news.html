<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News – Steve's App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon"><i class="fas fa-layer-group"></i></span>
      <span class="logo-text">Steve's App</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html"   class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
      <li><a href="news.html"    class="nav-item active"><i class="fas fa-newspaper"></i><span>News</span></a></li>
      <li><a href="markets.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Markets</span></a></li>
      <li><a href="tasks.html"   class="nav-item"><i class="fas fa-check-square"></i><span>Tasks</span></a></li>
    </ul>
    <div class="sidebar-footer"><span id="sidebar-clock"></span></div>
  </nav>
  <main class="main-content">
    <div class="news-header">
      <h1><i class="fas fa-newspaper"></i> News Feed</h1>
      <p>Stay up to date across categories</p>
    </div>
    <div class="api-notice">
      <i class="fas fa-key"></i>
      <span>Add your <strong>NewsData.io</strong> key (primary) and/or <strong>GNews</strong> key (fallback) in <code>news.js</code>.</span>
    </div>
    <div class="category-tabs" id="category-tabs">
      <button class="tab-btn active" data-category="world">🌍 World</button>
      <button class="tab-btn" data-category="top">📰 General</button>
      <button class="tab-btn" data-category="business">💹 Finance</button>
      <button class="tab-btn" data-category="politics">🏛️ Politics</button>
      <button class="tab-btn" data-category="technology">💻 Technology</button>
      <button class="tab-btn" data-category="india">🇮🇳 India</button>
      <button class="tab-btn" data-category="usa">🇺🇸 USA</button>
      <button class="tab-btn" data-category="war">⚔️ War & Conflict</button>
      <button class="tab-btn" data-category="economics">📊 Economics</button>
    </div>
    <div class="news-grid" id="news-grid">
      <div class="news-placeholder"><i class="fas fa-satellite-dish"></i><p>Add your API key to fetch live news</p></div>
    </div>
  </main>
  <script src="app.js"></script>
  <script src="news.js"></script>
</body>
</html>
