<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steve's Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon"><i class="fas fa-layer-group"></i></span>
      <span class="logo-text">Steve's App</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html"   class="nav-item active"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
      <li><a href="news.html"    class="nav-item"><i class="fas fa-newspaper"></i><span>News</span></a></li>
      <li><a href="markets.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Markets</span></a></li>
      <li><a href="tasks.html"   class="nav-item"><i class="fas fa-check-square"></i><span>Tasks</span></a></li>
    </ul>
    <div class="sidebar-footer"><span id="sidebar-clock"></span></div>
  </nav>

  <main class="main-content">
    <div class="dashboard-hero">
      <div class="greeting-card">
        <div class="greeting-icon" id="greeting-icon"></div>
        <h1 id="greeting-text">Hello, Steve</h1>
        <p class="greeting-date" id="greeting-date"></p>
      </div>
    </div>

    <!-- Dashboard Task Widget -->
    <div class="dash-tasks-widget">
      <div class="widget-header">
        <span><i class="fas fa-check-square"></i> Pending Tasks</span>
        <a href="tasks.html" class="widget-link">View All <i class="fas fa-arrow-right"></i></a>
      </div>
      <div id="dash-task-list"></div>
    </div>

    <!-- Fact -->
    <div class="fact-section">
      <div class="fact-card">
        <div class="fact-header"><i class="fas fa-lightbulb"></i><span>Fact of the Day</span></div>
        <p class="fact-text" id="fact-text">Loading fact...</p>
        <button class="fact-refresh" id="fact-refresh"><i class="fas fa-rotate-right"></i> New Fact</button>
      </div>
    </div>

    <!-- For You Feed -->
    <div class="foryou-section">
      <div class="foryou-header">
        <span><i class="fas fa-bolt"></i> For You</span>
        <span class="foryou-live"><i class="fas fa-circle"></i> Live</span>
      </div>
      <div class="foryou-tabs" id="foryou-tabs">
        <button class="fy-tab active" data-topic="world">🌍 World</button>
        <button class="fy-tab" data-topic="war">⚔️ Wars & Events</button>
        <button class="fy-tab" data-topic="markets">📈 Markets</button>
        <button class="fy-tab" data-topic="tech">🤖 AI & Tech</button>
        <button class="fy-tab" data-topic="uspolitics">🏛️ US Politics</button>
        <button class="fy-tab" data-topic="india">🇮🇳 India</button>
        <button class="fy-tab" data-topic="usnews">🇺🇸 US News</button>
        <button class="fy-tab" data-topic="economics">📊 Economics</button>
        <button class="fy-tab" data-topic="sports">🏅 Sports & Events</button>
      </div>
      <div class="foryou-grid" id="foryou-grid">
        <div class="foryou-placeholder"><i class="fas fa-rss"></i><p>Loading your feed...</p></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="tasks.js"></script>
  <script src="foryou.js"></script>
</body>
</html>
